<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>留学冶炼屋（理工版）</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/rpg.css" />
    <script src="/rpg-npc.js"></script>
  </head>
  <body class="rpg-mode">
    <div class="container">
      <div class="nav">
        <div class="brand">
          <span style="width:10px;height:10px;border-radius:999px;background:var(--accent)"></span>
          <span>留学冶炼屋（理工版）</span>
          <span class="badge" id="cfgBadge">加载中…</span>
        </div>
        <div class="row noPrint" style="margin:0">
          <a class="btn ghost" href="/">退出诊断</a>
        </div>
      </div>

      <div id="rpgScene" class="rpg-scene">
        <div class="rpg-hud">
          <div class="rpg-hud-chapter" id="hudChapter">信息登记</div>
          <div class="rpg-hud-stats">
            <span class="rpg-stat" id="hudStep">— / —</span>
            <span class="rpg-stat accent" id="hudXp">SCORE 0</span>
            <span class="rpg-stat gold" id="hudPhase">登记</span>
            <span class="rpg-inventory-btn" id="invBtn" title="背包">
              🎒
              <span class="rpg-inventory-badge rpg-hidden" id="invBadge">0</span>
            </span>
          </div>
        </div>
        <div class="rpg-chapters" id="chapterBar"></div>

        <!-- 信息登记 -->
        <div id="rcPanel" class="rpg-create rpg-hidden">
          <h2 id="rcStepTitle">信息登记</h2>
          <p class="muted" id="rcStepIntro">告诉我你的名字，以及你的专业背景。</p>
          <div id="rcFieldGrid" style="display:grid;gap:14px;margin-top:14px"></div>
        </div>

        <!-- 锻造：对话框 -->
        <div id="playPanel" class="rpg-stage rpg-hidden">
          <div class="rpg-dialogue-wrap rpg-fade-in" id="dialogueWrap">
            <div class="rpg-npc-block">
              <div class="rpg-npc-portrait" id="npcPortrait" aria-hidden="true"></div>
              <div class="rpg-dialogue">
                <div class="rpg-speaker" id="speakerName">路径导师</div>
                <div class="rpg-text" id="dialogueText"></div>
              </div>
            </div>
            <div class="rpg-player-row" id="playerRow">
              <div class="rpg-player-portrait" id="playerPortrait" aria-hidden="true"></div>
              <span class="rpg-player-label">你的回答</span>
            </div>
            <div class="rpg-choices" id="choices"></div>
          </div>
        </div>

        <!-- 终章：定稿输出 -->
        <div id="endPanel" class="rpg-create rpg-hidden">
          <h2 id="endTitle">终章 · 定稿输出</h2>
          <p class="muted" id="endIntro">留下联系方式，路径导师将为你生成「留学路径图谱」。</p>
          <div id="endFieldGrid" style="display:grid;gap:14px;margin-top:14px"></div>
        </div>

        <div class="rpg-footer noPrint">
          <p class="hint" id="footerHint">加载题库中…</p>
          <div style="display:flex;gap:8px">
            <button type="button" class="btn" id="backBtn">← 回退</button>
            <button type="button" class="btn primary" id="nextBtn">继续 →</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
    <script>
      const NPC_MAP = {
        academic: "academics",
        gap: "math_cs",
        experience: "projects",
        clarity: "positioning",
        fit: "communication",
        execution: "lead",
      };

      const ORE_EMOJI = {
        shadow: "⚫",
        flame: "🔴",
        nature: "🟢",
        earth: "🟤",
        crystal: "⚪",
      };

      const DROP_TABLE = [
        { id: "xp_scroll", name: "经验卷轴", emoji: "📜", rarity: "common", chance: 0.50, effect: { xp: [5, 15] }, msg: "掉落经验卷轴！" },
        { id: "attr_stone", name: "属性石", emoji: "💎", rarity: "rare", chance: 0.30, effect: { dimBonus: [3, 8] }, msg: "掉落属性石！" },
        { id: "mentor_note", name: "导师便签", emoji: "📝", rarity: "epic", chance: 0.15, effect: { note: true }, msg: "导师留下了一张便签！" },
        { id: "lucky_charm", name: "幸运符", emoji: "🍀", rarity: "legendary", chance: 0.05, effect: { offerProb: [2, 5] }, msg: "传说级掉落——幸运符！" },
      ];

      const CARD_POOL = [
        { id: "xp_boost", name: "经验加成", emoji: "⚡", rarity: "common", desc: "+15 XP", effect: { xp: 15 } },
        { id: "academic_stone", name: "学业石", emoji: "📚", rarity: "rare", desc: "学业底牌 +5", effect: { dim: "academic", bonus: 5 } },
        { id: "gap_filler", name: "跨度补剂", emoji: "🧪", rarity: "rare", desc: "跨界难度 -5", effect: { dim: "gap", bonus: 5 } },
        { id: "clarity_lens", name: "清晰透镜", emoji: "🔮", rarity: "epic", desc: "方向清晰 +8", effect: { dim: "clarity", bonus: 8 } },
        { id: "exec_potion", name: "执行药水", emoji: "⚗️", rarity: "epic", desc: "执行韧性 +8", effect: { dim: "execution", bonus: 8 } },
        { id: "fortune_star", name: "命运之星", emoji: "⭐", rarity: "legendary", desc: "全属性 +3, +25 XP", effect: { allDim: 3, xp: 25 } },
      ];

      const RARITY_NAMES = { common: "普通", rare: "稀有", epic: "史诗", legendary: "传说" };
      const RARITY_COLORS = { common: "rgba(200,200,200,.7)", rare: "#8ab4f8", epic: "#c58af9", legendary: "#f0c878" };

      const state = {
        cfg: null,
        qb: null,
        phase: "loading",
        rcStepIdx: 0,
        gateIdx: 0,
        gateItemIdx: 0,
        gateItems: [],
        pendingAnswer: null,
        answers: {},
        xp: 0,
        typing: false,
        inventory: [],
        buffs: [],
        dropsEnabled: true,
        usedItems: [],
      };

      function clearChildren(el) { while (el.firstChild) el.removeChild(el.firstChild); }
      function setBadge(text) { qs("#cfgBadge").textContent = text; }

      function updateHud() {
        if (state.phase === "rc") {
          qs("#hudPhase").textContent = "登记";
          qs("#hudChapter").textContent = state.qb.roleCard.steps[state.rcStepIdx]?.title || "";
          qs("#hudStep").textContent = `${state.rcStepIdx + 1} / ${state.qb.roleCard.steps.length}`;
        } else if (state.phase === "gate") {
          const gate = state.qb.gates[state.gateIdx];
          const phaseNames = ["学业", "跨度", "方向", "执行"];
          qs("#hudPhase").textContent = phaseNames[state.gateIdx] || `第${state.gateIdx + 1}步`;
          qs("#hudChapter").textContent = gate.title;
          qs("#hudStep").textContent = `${state.gateItemIdx + 1} / ${state.gateItems.length}`;
        } else if (state.phase === "end") {
          qs("#hudPhase").textContent = "定稿";
          qs("#hudChapter").textContent = "终章 · 定稿输出";
          qs("#hudStep").textContent = "联系方式";
        }
        qs("#hudXp").textContent = `SCORE ${state.xp}`;
      }

      const PHASE_MAP = [
        { id: "rc", label: "登记", icon: "📝" },
        { id: "gate0", label: "学业", icon: "📚" },
        { id: "gate1", label: "跨度", icon: "⚡" },
        { id: "gate2", label: "方向", icon: "🧭" },
        { id: "gate3", label: "执行", icon: "⚔️" },
        { id: "end", label: "定稿", icon: "🏺" },
      ];

      function getPhaseIndex() {
        if (state.phase === "rc") return 0;
        if (state.phase === "gate") return state.gateIdx + 1;
        if (state.phase === "end" || state.phase === "submitting") return PHASE_MAP.length - 1;
        return 0;
      }

      function renderChapterBar() {
        const bar = qs("#chapterBar");
        clearChildren(bar);
        bar.className = "rpg-path-map";
        const currentIdx = getPhaseIndex();
        PHASE_MAP.forEach((phase, i) => {
          const node = document.createElement("div");
          node.className = "rpg-path-node";
          const isActive = i === currentIdx;
          const isDone = i < currentIdx;
          if (isActive) node.classList.add("active");
          if (isDone) node.classList.add("done");
          const dot = document.createElement("span");
          dot.className = "rpg-path-dot" + (isActive ? " active" : "") + (isDone ? " done" : "");
          dot.innerHTML = `<span class="dot-icon">${phase.icon}</span>`;
          const label = document.createElement("span");
          label.className = "rpg-path-label";
          label.textContent = phase.label;
          node.appendChild(dot);
          node.appendChild(label);
          bar.appendChild(node);
          if (i < PHASE_MAP.length - 1) {
            const line = document.createElement("span");
            line.className = "rpg-path-line" + (isDone ? " done" : "");
            bar.appendChild(line);
          }
        });
      }

      /* ===== 反馈气泡 ===== */
      function showFeedbackBubble(text, type = "neutral") {
        const bubble = document.createElement("div");
        bubble.className = `rpg-feedback-bubble ${type}`;
        bubble.textContent = text;
        const x = 60 + Math.random() * (window.innerWidth - 320);
        const y = window.innerHeight * 0.35 + Math.random() * 80;
        bubble.style.left = `${x}px`;
        bubble.style.top = `${y}px`;
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 2000);
      }

      function pickFeedbackForAnswer(q, optId) {
        if (q.type === "star") {
          const n = Number(optId);
          if (n <= 2) return ["执行力还有很大提升空间，导师会重点帮你", "warn"];
          if (n === 3) return ["执行力中等，继续推进会有质变", "neutral"];
          return ["执行力很强，保持这个节奏", "positive"];
        }
        if (q.dim === "academic" && String(optId).startsWith("gpa_")) {
          if (optId === "gpa_high") return ["GPA 很硬，这是你的核心底牌", "positive"];
          if (optId === "gpa_mid") return ["GPA 中等，可以用其他维度补", "neutral"];
          if (optId === "gpa_low") return ["GPA 偏低，建议用排名或核心课补", "warn"];
        }
        if (q.dim === "experience" && String(optId).startsWith("intern_")) {
          if (String(optId).includes("tier1") || String(optId).includes("big")) return ["这段实习含金量很高", "positive"];
          if (optId === "intern_none") return ["没有实习是个明显短板，要抓紧", "warn"];
        }
        if (q.dim === "clarity" && String(optId).startsWith("target_")) {
          if (optId === "target_clear") return ["目标清晰是最大优势", "positive"];
          if (optId === "target_none") return ["方向还没定？这是现在最该做的事", "warn"];
        }
        if (q.dim === "execution" && String(optId).startsWith("todo_")) {
          if (optId === "todo_done") return ["执行力很强，继续保持", "positive"];
          if (optId === "todo_none") return ["还没开始？现在就是最好的时机", "warn"];
        }
        if (q.dim === "gap" && String(optId).startsWith("switch_")) {
          if (String(optId).includes("hard")) return ["跨度很大，需要额外准备", "warn"];
          if (String(optId).includes("same")) return ["同方向申请，基础是稳的", "positive"];
        }
        const r = Math.random();
        if (r < 0.25) return ["记录成功，继续深入", "neutral"];
        if (r < 0.5) return ["这个选择会影响后续推荐", "neutral"];
        return null;
      }

      /* ===== 可用道具系统 ===== */
      function getBestOption(q) {
        const scoring = q.scoring;
        if (!scoring || !q.options) return null;
        let bestOpt = null;
        let bestScore = -Infinity;
        for (const opt of q.options) {
          if (opt.type === "text") continue;
          const delta = scoring.options?.[String(opt.id)];
          if (!delta) continue;
          const score = Object.values(delta).reduce((s, v) => s + (Number(v) || 0), 0);
          if (score > bestScore) { bestScore = score; bestOpt = opt; }
        }
        return bestOpt;
      }

      function getUnusedItemIndex(itemId) {
        return state.inventory.findIndex((it) => it.id === itemId && !it.used);
      }

      function hasUsableItem(itemId) {
        return getUnusedItemIndex(itemId) >= 0;
      }

      function consumeItem(itemId) {
        const idx = getUnusedItemIndex(itemId);
        if (idx < 0) return null;
        const it = state.inventory[idx];
        it.used = true;
        state.usedItems.push({ id: it.id, name: it.name, emoji: it.emoji, effect: it.effect, xpValue: it.xpValue, dimValue: it.dimValue, offerValue: it.offerValue, noteText: it.noteText, collectedAt: it.collectedAt, usedAt: Date.now() });
        updateInvBadge();
        return it;
      }

      function renderItemUseBtn(q, isScenario) {
        const btnWrap = document.createElement("div");
        btnWrap.className = "rpg-item-use-bar";
        btnWrap.style.cssText = "margin:10px 0 6px;display:flex;gap:8px;flex-wrap:wrap;";

        // 经验卷轴：仅用于情景题揭示最佳答案；
        // 主观偏好题（preferenceTag）和真实自评题不允许使用，避免结果偏差
        if (isScenario && !q.preferenceTag && (q.type === "single" || q.type === "multi") && hasUsableItem("xp_scroll")) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "rpg-item-btn";
          btn.innerHTML = `<span class="emoji">📜</span> 使用经验卷轴`;
          btn.onclick = () => {
            const it = consumeItem("xp_scroll");
            if (!it) return;
            const best = getBestOption(q);
            if (best) {
              // 高亮最佳选项
              const targetBtn = qs(`#choices .rpg-choice[data-id="${best.id}"]`);
              if (targetBtn) {
                targetBtn.classList.add("hinted");
                targetBtn.style.borderColor = "rgba(201,160,80,.7)";
                targetBtn.style.background = "rgba(201,160,80,.12)";
              }
              showFeedbackBubble(`导师提示：「${best.label}」是当前最优解`, "positive");
            } else {
              showFeedbackBubble("导师提示：这道题没有明显最优解，凭直觉选吧", "neutral");
            }
            // 更新按钮状态
            btn.remove();
            if (!hasUsableItem("xp_scroll")) {
              const all = qsa(".rpg-item-btn[data-item='xp_scroll']");
              all.forEach((b) => b.remove());
            }
          };
          btnWrap.appendChild(btn);
        }
        return btnWrap;
      }

      /* ===== 屏幕闪红 ===== */
      function triggerScreenFlash() {
        const flash = document.createElement("div");
        flash.className = "rpg-screen-flash";
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 700);
      }

      function triggerEventBanner(text = "⚡ 突发情境") {
        const scene = qs("#rpgScene");
        const banner = document.createElement("div");
        banner.className = "rpg-event-banner";
        banner.textContent = text;
        scene.appendChild(banner);
        setTimeout(() => banner.remove(), 1500);
      }

      /* ===== 随机掉落系统 ===== */
      function tryRandomDrop() {
        if (!state.dropsEnabled) return;
        // 题后掉落触发概率：20%~60%（每次在区间内随机，避免过于频繁）
        const triggerChance = 0.2 + Math.random() * 0.4;
        if (Math.random() > triggerChance) return;
        const roll = Math.random();
        let cumulative = 0;
        let drop = null;
        for (const d of DROP_TABLE) {
          cumulative += d.chance;
          if (roll <= cumulative) { drop = d; break; }
        }
        if (!drop) return;
        spawnDrop(drop);
      }

      function spawnDrop(drop) {
        const el = document.createElement("div");
        el.className = `rpg-drop-item ${drop.rarity}`;
        el.textContent = drop.emoji;
        const x = 40 + Math.random() * (window.innerWidth - 120);
        el.style.left = `${x}px`;
        el.style.top = "80px";
        document.body.appendChild(el);

        showLootToast(drop.msg);

        const collect = () => {
          if (el.classList.contains("collected")) return;
          el.classList.add("collected");
          collectDrop(drop);
          setTimeout(() => el.remove(), 600);
        };

        el.onclick = collect;
        // 3秒后自动收集
        setTimeout(() => { if (el.parentNode && !el.classList.contains("collected")) collect(); }, 3000);
      }

      function showLootToast(text) {
        const toast = document.createElement("div");
        toast.className = "rpg-loot-toast";
        toast.textContent = text;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
      }

      function collectDrop(drop) {
        const item = { ...drop, collectedAt: Date.now() };
        if (drop.effect.xp) {
          const amt = randInt(drop.effect.xp[0], drop.effect.xp[1]);
          item.xpValue = amt;
          state.xp += amt;
        }
        if (drop.effect.dimBonus) {
          const bonus = randInt(drop.effect.dimBonus[0], drop.effect.dimBonus[1]);
          item.dimValue = bonus;
          state.buffs.push({ type: "dim", value: bonus, from: drop.name, emoji: drop.emoji });
        }
        if (drop.effect.offerProb) {
          const prob = randInt(drop.effect.offerProb[0], drop.effect.offerProb[1]);
          item.offerValue = prob;
          state.buffs.push({ type: "offer", value: prob, from: drop.name, emoji: drop.emoji });
        }
        if (drop.effect.note) {
          const notes = ["优先补GPA，它是硬通货", "实习经历比科研项目更值钱", "先定方向，再选学校", "语言成绩达标即可，不要刷分", "推荐信要找真正了解你的人"];
          item.noteText = notes[Math.floor(Math.random() * notes.length)];
        }
        state.inventory.push(item);
        updateHud();
        updateInvBadge();
      }

      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      /* ===== 抽卡系统 ===== */
      async function showCardDraw() {
        return new Promise((resolve) => {
          let ov = qs("#drawOverlay");
          if (!ov) {
            ov = document.createElement("div");
            ov.id = "drawOverlay";
            ov.className = "rpg-draw-overlay";
            document.body.appendChild(ov);
          }
          ov.innerHTML = `
            <div class="rpg-draw-title">🎴 阶段奖励 · 抽一张卡</div>
            <div class="rpg-draw-sub">三张卡中只有一张是你的命运之选</div>
            <div class="rpg-card-row" id="cardRow"></div>
          `;

          const row = ov.querySelector("#cardRow");
          clearChildren(row);

          // 随机抽取3张卡（可重复稀有度，增加趣味性）
          const cards = [];
          for (let i = 0; i < 3; i++) {
            const rarityRoll = Math.random();
            let pool;
            if (rarityRoll < 0.50) pool = CARD_POOL.filter(c => c.rarity === "common");
            else if (rarityRoll < 0.78) pool = CARD_POOL.filter(c => c.rarity === "rare");
            else if (rarityRoll < 0.94) pool = CARD_POOL.filter(c => c.rarity === "epic");
            else pool = CARD_POOL.filter(c => c.rarity === "legendary");
            if (pool.length === 0) pool = CARD_POOL;
            cards.push(pool[Math.floor(Math.random() * pool.length)]);
          }
          // 确保至少有一张稀有或以上
          if (cards.every(c => c.rarity === "common")) {
            cards[1] = CARD_POOL.filter(c => c.rarity !== "common")[Math.floor(Math.random() * 5)];
          }

          cards.forEach((card, idx) => {
            const cardEl = document.createElement("div");
            cardEl.className = "rpg-card";
            cardEl.innerHTML = `
              <div class="rpg-card-inner">
                <div class="rpg-card-face rpg-card-back"></div>
                <div class="rpg-card-face rpg-card-front ${card.rarity}">
                  <div class="rpg-card-emoji">${card.emoji}</div>
                  <div class="rpg-card-name">${escapeHtml(card.name)}</div>
                  <div class="rpg-card-desc">${escapeHtml(card.desc)}</div>
                  <div class="rpg-card-rarity" style="color:${RARITY_COLORS[card.rarity]}">${RARITY_NAMES[card.rarity]}</div>
                </div>
              </div>
            `;
            cardEl.onclick = () => {
              // 翻开所有卡
              row.querySelectorAll(".rpg-card").forEach((c, i) => {
                c.classList.add("flipped");
                if (i !== idx) c.classList.add("not-picked");
                else c.classList.add("picked");
              });
              // 应用效果
              applyCardEffect(card);
              // 显示获得提示
              showLootToast(`获得 ${card.name}！${card.desc}`);
              // 2秒后关闭
              setTimeout(() => {
                ov.classList.remove("show");
                resolve();
              }, 2200);
            };
            row.appendChild(cardEl);
          });

          requestAnimationFrame(() => ov.classList.add("show"));
        });
      }

      function applyCardEffect(card) {
        const eff = card.effect;
        if (eff.xp) {
          state.xp += eff.xp;
        }
        if (eff.dim && eff.bonus) {
          state.buffs.push({ type: "dim", value: eff.bonus, from: card.name, emoji: card.emoji });
        }
        if (eff.allDim && eff.xp) {
          state.buffs.push({ type: "allDim", value: eff.allDim, from: card.name, emoji: card.emoji });
          state.xp += eff.xp;
        }
        state.inventory.push({ ...card, collectedAt: Date.now(), isCard: true });
        updateHud();
        updateInvBadge();
      }

      /* ===== 背包系统 ===== */
      function updateInvBadge() {
        const badge = qs("#invBadge");
        const total = state.inventory.length;
        if (total > 0) {
          badge.textContent = total > 99 ? "99+" : total;
          badge.classList.remove("rpg-hidden");
        } else {
          badge.classList.add("rpg-hidden");
        }
      }

      function toggleInventory() {
        let panel = qs("#invPanel");
        if (!panel) {
          panel = document.createElement("div");
          panel.id = "invPanel";
          panel.className = "rpg-inventory-panel";
          document.body.appendChild(panel);
        }
        if (panel.classList.contains("show")) {
          panel.classList.remove("show");
          return;
        }
        renderInventory(panel);
        panel.classList.add("show");
        // 点击外部关闭
        const closeOnOutside = (e) => {
          if (!panel.contains(e.target) && e.target !== qs("#invBtn")) {
            panel.classList.remove("show");
            document.removeEventListener("click", closeOnOutside);
          }
        };
        setTimeout(() => document.addEventListener("click", closeOnOutside), 50);
      }

      function renderInventory(panel) {
        const buffsHtml = state.buffs.length > 0
          ? `<div class="rpg-buff-row">${state.buffs.map(b => `<span class="rpg-buff-pill">${b.emoji} ${b.from} ${b.type === "dim" || b.type === "allDim" ? "+" + b.value : "+" + b.value + "%"}</span>`).join("")}</div>`
          : "";

        const itemsHtml = state.inventory.length > 0
          ? state.inventory.slice().reverse().map(it => {
            const isUsed = it.used;
            const effectText = it.xpValue ? "+" + it.xpValue + " XP" : it.dimValue ? "+" + it.dimValue : it.offerValue ? "+" + it.offerValue + "%" : it.noteText ? "💡" : it.desc || "";
            return `
            <div class="rpg-inv-item ${isUsed ? 'used' : ''}">
              <span class="emoji">${it.emoji}</span>
              <span class="name">${escapeHtml(it.name)}</span>
              <span class="effect">${effectText}${isUsed ? '<span class="used-tag">已使用</span>' : ''}</span>
            </div>
          `;
          }).join("")
          : `<div class="rpg-inv-empty">背包空空如也<br/>回答问题或完成阶段可获得奖励</div>`;

        panel.innerHTML = `
          <h4>🎒 背包 (${state.inventory.length})</h4>
          ${buffsHtml}
          <div style="margin-top:10px">${itemsHtml}</div>
        `;
      }

      function getOptionsForField(field) {
        if (field.options) return field.options;
        const ref = field.optionsRef;
        if (!ref) return [];
        if (ref === "industries.id") return state.cfg.industries.map((i) => ({ id: i.id, label: `${i.icon} ${i.name}` }));
        if (ref === "roles.id") return state.cfg.roles.map((r) => ({ id: r.id, label: `${r.icon} ${r.name}` }));
        if (ref === "companyTypes.id") return state.cfg.companyTypes.map((c) => ({ id: c.id, label: `${c.icon} ${c.name}` }));
        return [];
      }

      function renderRcStep() {
        const step = state.qb.roleCard.steps[state.rcStepIdx];
        qs("#rcStepTitle").textContent = step.title;
        qs("#rcStepIntro").textContent = step.intro || "";
        const grid = qs("#rcFieldGrid");
        clearChildren(grid);

        for (const field of step.fields) {
          const wrap = document.createElement("div");
          wrap.className = "rc-field";
          const label = document.createElement("label");
          label.style.cssText = "display:block;font-weight:700;font-size:13px;margin-bottom:6px;color:var(--text);font-family:var(--font-display);letter-spacing:.04em";
          label.textContent = field.label + (field.required ? " *" : "");
          wrap.appendChild(label);

          if (field.type === "text") {
            const input = document.createElement("input");
            input.type = "text";
            input.id = `rcf_${field.id}`;
            input.placeholder = field.placeholder || "";
            input.value = state.answers[field.id] || "";
            input.style.cssText = "width:100%;padding:10px 12px;border-radius:2px;border:2px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px";
            input.oninput = () => { state.answers[field.id] = input.value; };
            wrap.appendChild(input);
          } else if (field.type === "number") {
            const input = document.createElement("input");
            input.type = "number";
            input.step = "0.1";
            input.id = `rcf_${field.id}`;
            input.placeholder = field.placeholder || "";
            input.value = state.answers[field.id] ?? "";
            input.style.cssText = "width:100%;padding:10px 12px;border-radius:2px;border:2px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px";
            input.oninput = () => { state.answers[field.id] = input.value === "" ? null : Number(input.value); };
            wrap.appendChild(input);
          } else if (field.type === "slider") {
            const sliderWrap = document.createElement("div");
            sliderWrap.className = "rpg-slider-wrap";
            const min = field.min ?? 0;
            const max = field.max ?? 100;
            const step = field.step ?? 1;
            const def = field.default !== undefined ? field.default : min + (max - min) / 2;
            const val = state.answers[field.id] ?? def;
            state.answers[field.id] = val;
            sliderWrap.innerHTML = `
              <input type="range" min="${min}" max="${max}" step="${step}" value="${val}" id="rcf_${field.id}" />
              <div class="rpg-slider-val">${val}</div>
              <div class="rpg-slider-labels"><span>${min}</span><span>${max}</span></div>
            `;
            const input = sliderWrap.querySelector("input");
            const valEl = sliderWrap.querySelector(".rpg-slider-val");
            input.oninput = () => {
              const v = Number(input.value);
              state.answers[field.id] = v;
              valEl.textContent = v;
              if (v >= 85 && !state._sliderFeedback85) {
                state._sliderFeedback85 = true;
                showFeedbackBubble("GPA 很亮眼，这是你的核心优势", "positive");
              } else if (v < 75 && !state._sliderFeedback75) {
                state._sliderFeedback75 = true;
                showFeedbackBubble("GPA 还有提升空间，其他维度要补", "warn");
              }
            };
            wrap.appendChild(sliderWrap);
          } else if (field.type === "single") {
            const grid2 = document.createElement("div");
            grid2.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px";
            const opts = getOptionsForField(field);
            for (const opt of opts) {
              const isOther = opt.type === "text";
              const card = document.createElement("button");
              card.type = "button";
              card.className = "rpg-class-card";
              if (state.answers[field.id] === opt.id) card.classList.add("picked");
              card.style.padding = "10px";
              card.innerHTML = `<div class="rpg-class-name">${escapeHtml(opt.label)}</div>`;
              card.onclick = () => {
                state.answers[field.id] = opt.id;
                Array.from(grid2.children).forEach((c) => c.classList.remove("picked"));
                card.classList.add("picked");
                // show/hide other input
                grid2.querySelectorAll(".rc-other-input").forEach((el) => el.style.display = "none");
                const otherInp = card.nextElementSibling;
                if (otherInp && otherInp.classList.contains("rc-other-input")) {
                  otherInp.style.display = "block";
                  otherInp.querySelector("input")?.focus();
                }
              };
              grid2.appendChild(card);
              if (isOther) {
                const otherWrap = document.createElement("div");
                otherWrap.className = "rc-other-input";
                otherWrap.style.cssText = "display:none;grid-column:1/-1";
                otherWrap.innerHTML = `<input type="text" placeholder="${escapeHtml(opt.placeholder || "请具体说明")}" style="width:100%;padding:10px 12px;border-radius:2px;border:2px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px" />`;
                const inp = otherWrap.querySelector("input");
                const otherKey = `_other_${field.id}`;
                inp.value = state.answers[otherKey] || "";
                inp.oninput = () => { state.answers[otherKey] = inp.value; };
                grid2.appendChild(otherWrap);
                if (state.answers[field.id] === opt.id) otherWrap.style.display = "block";
              }
            }
            wrap.appendChild(grid2);
          } else if (field.type === "multi") {
            const grid2 = document.createElement("div");
            grid2.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px";
            const selected = new Set(Array.isArray(state.answers[field.id]) ? state.answers[field.id] : []);
            const opts = getOptionsForField(field);
            for (const opt of opts) {
              const isOther = opt.type === "text";
              const card = document.createElement("button");
              card.type = "button";
              card.className = "rpg-class-card";
              if (selected.has(opt.id)) card.classList.add("picked");
              card.style.padding = "10px";
              card.innerHTML = `<div class="rpg-class-name">${escapeHtml(opt.label)}</div>`;
              card.onclick = () => {
                if (selected.has(opt.id)) {
                  selected.delete(opt.id);
                  const otherInp = card.nextElementSibling;
                  if (otherInp && otherInp.classList.contains("rc-other-input")) otherInp.style.display = "none";
                } else {
                  selected.add(opt.id);
                  const otherInp = card.nextElementSibling;
                  if (otherInp && otherInp.classList.contains("rc-other-input")) {
                    otherInp.style.display = "block";
                    otherInp.querySelector("input")?.focus();
                  }
                }
                state.answers[field.id] = [...selected];
                card.classList.toggle("picked");
              };
              grid2.appendChild(card);
              if (isOther) {
                const otherWrap = document.createElement("div");
                otherWrap.className = "rc-other-input";
                otherWrap.style.cssText = "display:none;grid-column:1/-1";
                otherWrap.innerHTML = `<input type="text" placeholder="${escapeHtml(opt.placeholder || "请具体说明")}" style="width:100%;padding:10px 12px;border-radius:2px;border:2px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px" />`;
                const inp = otherWrap.querySelector("input");
                const otherKey = `_other_${field.id}`;
                inp.value = state.answers[otherKey] || "";
                inp.oninput = () => { state.answers[otherKey] = inp.value; };
                grid2.appendChild(otherWrap);
                if (selected.has(opt.id)) otherWrap.style.display = "block";
              }
            }
            wrap.appendChild(grid2);
          }

          grid.appendChild(wrap);
        }
      }

      function validateRcStep() {
        const step = state.qb.roleCard.steps[state.rcStepIdx];
        for (const f of step.fields) {
          if (!f.required) continue;
          const v = state.answers[f.id];
          if (v === undefined || v === null || v === "" || (Array.isArray(v) && v.length === 0)) {
            return `请填写「${f.label}」`;
          }
        }
        return null;
      }

      function buildGateItems(gate) {
        const items = [];
        for (const qid of gate.questions || []) {
          const q = (state.qb.questions || []).find((x) => x.id === qid);
          if (q) items.push({ kind: "q", item: q });
        }
        for (const sid of gate.scenarios || []) {
          const s = state.qb.scenariosById?.[sid];
          if (s) items.push({ kind: "s", item: s });
        }
        return items;
      }

      function getNpcKey(gate) {
        return NPC_MAP[gate.id] || gate.npc || "academics";
      }

      function getOreEmoji() {
        const ore = state.answers.rc_ore_type;
        return ORE_EMOJI[ore] || "🪨";
      }

      async function renderGateItem() {
        const gate = state.qb.gates[state.gateIdx];
        const itemWrap = state.gateItems[state.gateItemIdx];
        if (!itemWrap) return;
        const isScenario = itemWrap.kind === "s";
        const q = itemWrap.item;
        const npcKey = getNpcKey(gate);

        qs("#rcPanel").classList.add("rpg-hidden");
        qs("#endPanel").classList.add("rpg-hidden");
        qs("#playPanel").classList.remove("rpg-hidden");
        qs("#rpgScene").classList.toggle("event-mode", isScenario);

        // 情境题特效：闪红 + 横幅
        if (isScenario) {
          triggerScreenFlash();
          triggerEventBanner("⚡ 突发情境");
        }

        setNpcPortrait(npcKey, { event: isScenario });
        const oreEmoji = getOreEmoji();
        const pPortrait = qs("#playerPortrait");
        if (pPortrait) pPortrait.innerHTML = `<div style="font-size:26px;display:flex;align-items:center;justify-content:center;height:40px;width:40px;background:rgba(212,83,42,.15);border:2px solid rgba(212,83,42,.45);border-radius:50%">${oreEmoji}</div>`;

        const sp = qs("#speakerName");
        sp.textContent = isScenario ? "⚡ 真实情境" : "路径导师";
        sp.classList.toggle("event", isScenario);

        renderChapterBar();
        updateHud();

        state.pendingAnswer = state.answers[q.id] ?? (q.type === "multi" ? [] : null);
        clearChildren(qs("#choices"));

        const wrap = qs("#dialogueWrap");
        wrap.classList.remove("rpg-fade-in");
        void wrap.offsetWidth;
        wrap.classList.add("rpg-fade-in");

        state.typing = true;
        qs("#nextBtn").disabled = true;
        const txt = (q.context ? `【${q.context}】\n` : "") + q.title;
        await typewriter(qs("#dialogueText"), txt, { speed: isScenario ? 12 : 16 });
        state.typing = false;
        qs("#nextBtn").disabled = false;

        renderChoices(q, isScenario);
      }

      function renderChoices(q, isScenario) {
        const choicesEl = qs("#choices");
        const itemBar = renderItemUseBtn(q, isScenario);
        if (itemBar.childNodes.length > 0) choicesEl.appendChild(itemBar);
        if (q.type === "single") {
          for (const opt of q.options || []) {
            const isOther = opt.type === "text";
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "rpg-choice" + (isScenario ? " event" : "") + (state.pendingAnswer === opt.id ? " selected" : "");
            btn.textContent = opt.label;
            btn.dataset.id = opt.id;
            btn.onclick = () => {
              state.pendingAnswer = opt.id;
              qsa("#choices .rpg-choice").forEach((b) => b.classList.remove("selected"));
              btn.classList.add("selected");
              // show/hide other inputs
              qsa("#choices .other-input").forEach((inp) => inp.style.display = "none");
              const otherInp = btn.nextElementSibling;
              if (otherInp && otherInp.classList.contains("other-input")) {
                otherInp.style.display = "grid";
                otherInp.querySelector("input,textarea")?.focus();
              }
              qs("#footerHint").textContent = "已选择，点「继续」";
              state.xp += 3;
              updateHud();
              const fb = pickFeedbackForAnswer(q, opt.id);
              if (fb) showFeedbackBubble(fb[0], fb[1]);
            };
            choicesEl.appendChild(btn);
            if (isOther) {
              const wrap = document.createElement("div");
              wrap.className = "other-input";
              wrap.style.cssText = "display:none;gap:8px;width:100%;margin-top:-4px;margin-bottom:4px";
              wrap.innerHTML = `<input type="text" placeholder="${escapeHtml(opt.placeholder || "请具体说明")}" style="width:100%;padding:10px 12px;border-radius:2px;border:2px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px" />`;
              const inp = wrap.querySelector("input");
              const otherKey = `_other_${q.id}`;
              inp.value = state.answers[otherKey] || "";
              inp.oninput = () => { state.answers[otherKey] = inp.value; };
              choicesEl.appendChild(wrap);
              if (state.pendingAnswer === opt.id) wrap.style.display = "grid";
            }
          }
          qs("#footerHint").textContent = "选择一个回答";
        } else if (q.type === "multi") {
          const saved = new Set(Array.isArray(state.pendingAnswer) ? state.pendingAnswer : []);
          for (const opt of q.options || []) {
            const isOther = opt.type === "text";
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "rpg-choice" + (saved.has(opt.id) ? " selected" : "");
            btn.textContent = opt.label;
            btn.dataset.id = opt.id;
            btn.onclick = () => {
              const wasSelected = saved.has(opt.id);
              if (wasSelected) {
                saved.delete(opt.id);
                const otherInp = btn.nextElementSibling;
                if (otherInp && otherInp.classList.contains("other-input")) {
                  otherInp.style.display = "none";
                }
              } else {
                saved.add(opt.id);
                const otherInp = btn.nextElementSibling;
                if (otherInp && otherInp.classList.contains("other-input")) {
                  otherInp.style.display = "grid";
                  otherInp.querySelector("input,textarea")?.focus();
                }
              }
              state.pendingAnswer = [...saved];
              btn.classList.toggle("selected");
              if (!wasSelected) {
                state.xp += 2;
                updateHud();
                const fb = pickFeedbackForAnswer(q, opt.id);
                if (fb) showFeedbackBubble(fb[0], fb[1]);
              }
            };
            choicesEl.appendChild(btn);
            if (isOther) {
              const wrap = document.createElement("div");
              wrap.className = "other-input";
              wrap.style.cssText = "display:none;gap:8px;width:100%;margin-top:-4px;margin-bottom:4px";
              wrap.innerHTML = `<input type="text" placeholder="${escapeHtml(opt.placeholder || "请具体说明")}" style="width:100%;padding:10px 12px;border-radius:2px;border:2px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px" />`;
              const inp = wrap.querySelector("input");
              const otherKey = `_other_${q.id}`;
              inp.value = state.answers[otherKey] || "";
              inp.oninput = () => { state.answers[otherKey] = inp.value; };
              choicesEl.appendChild(wrap);
              if (saved.has(opt.id)) wrap.style.display = "grid";
            }
          }
          qs("#footerHint").textContent = "可多选，选完点「继续」";
        } else if (q.type === "number") {
          const row = document.createElement("div");
          row.className = "rpg-input-row";
          row.innerHTML = `<input type="number" step="0.5" id="numInput" placeholder="${q.placeholder || "输入数字"}" value="${state.pendingAnswer ?? ""}" /><button type="button" class="btn primary" id="numOk">确认</button>`;
          choicesEl.appendChild(row);
          qs("#numOk").onclick = () => {
            const v = qs("#numInput").value;
            if (v === "") return;
            state.pendingAnswer = Number(v);
            qs("#footerHint").textContent = "已记录，点「继续」";
            state.xp += 2;
            updateHud();
            const fb = pickFeedbackForAnswer(q, "num_" + v);
            if (fb) showFeedbackBubble(fb[0], fb[1]);
          };
          qs("#footerHint").textContent = "填写数值后点确认，再点继续";
        } else if (q.type === "star") {
          const wrap = document.createElement("div");
          wrap.className = "rpg-star-row";
          const starCount = q.maxStars || 5;
          const savedVal = Number(state.pendingAnswer) || 0;
          const labelEl = document.createElement("span");
          labelEl.className = "rpg-star-label";
          const labels = q.starLabels || ["", "", "", "", ""];
          labelEl.textContent = savedVal > 0 ? labels[savedVal - 1] || `${savedVal} 星` : "点击评分";
          for (let s = 1; s <= starCount; s++) {
            const star = document.createElement("span");
            star.className = "rpg-star" + (s <= savedVal ? " on" : "");
            star.textContent = "★";
            star.onclick = () => {
              state.pendingAnswer = s;
              labelEl.textContent = labels[s - 1] || `${s} 星`;
              qsa("#choices .rpg-star").forEach((el, i) => {
                el.classList.toggle("on", i < s);
              });
              qs("#footerHint").textContent = "已评分，点「继续」";
              state.xp += s;
              updateHud();
              const msgs = ["", "还有提升空间", "中等水平", "不错", "很出色", "顶级水准"];
              const t = s >= 4 ? "positive" : s >= 3 ? "neutral" : "warn";
              showFeedbackBubble(msgs[s] || `${s} 星`, t);
            };
            wrap.appendChild(star);
          }
          wrap.appendChild(labelEl);
          choicesEl.appendChild(wrap);
          qs("#footerHint").textContent = "点击星星评分";
        } else if (q.type === "text") {
          const row = document.createElement("div");
          row.style.cssText = "display:grid;gap:8px;width:100%";
          row.innerHTML = `<textarea id="textInput" rows="3" placeholder="${escapeHtml(q.placeholder || "你的回答（可以留空）")}" style="width:100%;padding:12px 14px;border-radius:2px;border:2px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-family:inherit;font-size:14px;line-height:1.55;resize:vertical;min-height:80px">${escapeHtml(state.pendingAnswer || "")}</textarea><button type="button" class="btn" id="textSkip">跳过 / 留空</button>`;
          choicesEl.appendChild(row);
          const ta = row.querySelector("#textInput");
          ta.oninput = () => {
            state.pendingAnswer = ta.value;
            qs("#footerHint").textContent = ta.value.trim() ? "已记录，点「继续」" : "可以留空，点「继续」即可";
          };
          qs("#textSkip").onclick = () => {
            ta.value = "";
            state.pendingAnswer = "";
            qs("#footerHint").textContent = "已跳过，点「继续」";
          };
          qs("#footerHint").textContent = "想填就填，不想填点「跳过」也可以";
        }
      }

      function collectGateAnswer() {
        const itemWrap = state.gateItems[state.gateItemIdx];
        if (!itemWrap) return null;
        const q = itemWrap.item;
        let ans = state.pendingAnswer;
        if (q.type === "number") {
          const v = qs("#numInput")?.value;
          if (v !== undefined && v !== "") ans = Number(v);
        }
        if (q.type === "text") {
          const v = qs("#textInput")?.value;
          ans = v !== undefined ? v : "";
        }
        return ans;
      }

      function validateGateAnswer(q, ans) {
        if (q.type === "single" && (ans === null || ans === undefined || ans === "")) return "请选择一个回答";
        if (q.type === "multi" && (!Array.isArray(ans) || ans.length === 0)) return "请至少选择一项";
        if (q.type === "number" && (ans === null || ans === undefined || ans === "")) return "请填写数值";
        if (q.type === "star" && (ans === null || ans === undefined || ans === "")) return "请点击星星评分";
        return null;
      }

      async function renderGateClearOverlay(gate) {
        state.xp += 35 + state.gateIdx * 5;
        const phaseNames = ["学业评估", "跨度检验", "方向定型", "执行打磨"];
        const phase = phaseNames[state.gateIdx] || `第${state.gateIdx + 1}步`;
        await showRpgOverlay({
          rank: "🔥",
          title: `${phase} 完成`,
          sub: `积分 +${35 + state.gateIdx * 5}\n诊断持续深入中…`,
          btnText: "下一步 →",
        });
      }

      function renderEndChapter() {
        state.phase = "end";
        qs("#rcPanel").classList.add("rpg-hidden");
        qs("#playPanel").classList.add("rpg-hidden");
        qs("#endPanel").classList.remove("rpg-hidden");
        qs("#rpgScene").classList.remove("event-mode");

        const end = state.qb.endChapter;
        qs("#endTitle").textContent = end.title;
        qs("#endIntro").textContent = end.subtitle;
        const grid = qs("#endFieldGrid");
        clearChildren(grid);

        // === 终章道具使用区 ===
        const itemSection = document.createElement("div");
        itemSection.style.cssText = "margin-bottom:14px;padding:12px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,.03);";
        let itemHtml = `<h4 style="margin:0 0 10px 0;font-family:var(--font-display);letter-spacing:.04em;font-size:14px;">🎒 终章道具</h4><div style="display:flex;gap:10px;flex-wrap:wrap;">`;

        // 幸运符
        if (hasUsableItem("lucky_charm")) {
          const charm = state.inventory.find((it) => it.id === "lucky_charm" && !it.used);
          const val = charm?.offerValue || 3;
          itemHtml += `
            <label class="rpg-item-toggle">
              <input type="checkbox" id="useLuckyCharm" />
              <span>🍀 使用幸运符（录取概率 +${val}%）</span>
            </label>`;
        }
        // 属性石
        const attrStones = state.inventory.filter((it) => it.id === "attr_stone" && !it.used);
        if (attrStones.length > 0) {
          for (const stone of attrStones) {
            const dimSelect = `<select id="attrStone_${stone.collectedAt}" style="padding:4px 8px;border-radius:2px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:12px;">
              <option value="">选择维度…</option>
              <option value="academic">学业</option>
              <option value="gap">跨度</option>
              <option value="experience">经历</option>
              <option value="clarity">方向</option>
              <option value="execution">执行</option>
              <option value="fit">匹配</option>
            </select>`;
            itemHtml += `
              <label class="rpg-item-toggle">
                <input type="checkbox" data-stone="${stone.collectedAt}" class="attr-stone-cb" />
                <span>💎 使用属性石 +${stone.dimValue || 5} ${dimSelect}</span>
              </label>`;
          }
        }
        // 导师便签
        if (hasUsableItem("mentor_note")) {
          itemHtml += `
          <label class="rpg-item-toggle">
            <input type="checkbox" id="useMentorNote" />
            <span>📝 使用导师便签（报告增加额外洞察）</span>
          </label>`;
        }
        if (!hasUsableItem("lucky_charm") && attrStones.length === 0 && !hasUsableItem("mentor_note")) {
          itemHtml += `<span style="color:var(--muted);font-size:12px;">背包中没有可用的终章道具</span>`;
        }
        itemHtml += "</div>";
        itemSection.innerHTML = itemHtml;
        grid.appendChild(itemSection);

        for (const f of end.fields) {
          const wrap = document.createElement("div");
          const label = document.createElement("label");
          label.style.cssText = "display:block;font-weight:700;font-size:13px;margin-bottom:6px;color:var(--text);font-family:var(--font-display);letter-spacing:.04em";
          label.textContent = f.label + (f.required ? " *" : "");
          wrap.appendChild(label);
          if (f.type === "text") {
            const inp = document.createElement("input");
            inp.id = `endf_${f.id}`;
            inp.type = "text";
            inp.style.cssText = "width:100%;padding:12px;border-radius:2px;border:2px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px";
            wrap.appendChild(inp);
          } else if (f.type === "single") {
            const grid2 = document.createElement("div");
            grid2.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px";
            for (const opt of f.options || []) {
              const card = document.createElement("button");
              card.type = "button";
              card.className = "rpg-class-card";
              card.style.padding = "10px";
              card.innerHTML = `<div class="rpg-class-name">${escapeHtml(opt.label)}</div>`;
              card.onclick = () => {
                state.answers[f.id] = opt.id;
                Array.from(grid2.children).forEach((c) => c.classList.remove("picked"));
                card.classList.add("picked");
              };
              grid2.appendChild(card);
            }
            wrap.appendChild(grid2);
          }
          grid.appendChild(wrap);
        }
        qs("#footerHint").textContent = "填好联系方式后点「铸造图谱」";
        qs("#nextBtn").textContent = "铸造图谱 →";
        qs("#backBtn").style.visibility = "visible";
        renderChapterBar();
        updateHud();
      }

      async function submitAssessment() {
        const contact = qs("#endf_contact")?.value?.trim();
        if (!contact) {
          qs("#footerHint").textContent = "请填写联系方式";
          return;
        }
        const contactType = state.answers.contact_type || "wechat";
        const budget = state.answers.budget || null;
        const invitedBy = localStorage.getItem("inviteCode") || null;

        // 处理终章道具使用
        const itemEffects = { offerBoost: 0, dimBoosts: {}, extraNotes: [] };
        if (qs("#useLuckyCharm")?.checked) {
          const it = consumeItem("lucky_charm");
          if (it) itemEffects.offerBoost = it.offerValue || 3;
        }
        qsa(".attr-stone-cb").forEach((cb) => {
          if (cb.checked) {
            const stoneTs = cb.dataset.stone;
            const sel = qs(`#attrStone_${stoneTs}`);
            const dim = sel?.value;
            if (dim) {
              const stone = state.inventory.find((it) => it.id === "attr_stone" && !it.used && String(it.collectedAt) === stoneTs);
              if (stone) {
                stone.used = true;
                state.usedItems.push({ id: stone.id, name: stone.name, emoji: stone.emoji, effect: stone.effect, dimValue: stone.dimValue, targetDim: dim, usedAt: Date.now() });
                itemEffects.dimBoosts[dim] = (itemEffects.dimBoosts[dim] || 0) + (stone.dimValue || 5);
              }
            }
          }
        });
        if (qs("#useMentorNote")?.checked) {
          const it = consumeItem("mentor_note");
          if (it) itemEffects.extraNotes.push(it.noteText || "导师的额外建议");
        }

        state.phase = "submitting";
        qs("#nextBtn").disabled = true;
        qs("#backBtn").disabled = true;
        track("assessment_submit_click");
        await showLoadingOverlay({
          title: "正在生成路径图谱",
          steps: [
            "🔥 分析你的底牌…",
            "⚗️ 路径导师诊断短板…",
            "🌐 联网检索最新行情…",
            "⚔️ 锻造你的专属路径…",
          ],
        });

        try {
          const lead = await api("/api/leads", {
            method: "POST",
            body: { contactType, contact, source: "web", budget, invitedBy },
          });
          state.answers._lead_id = lead.id;
          const asm = await api("/api/assessments", {
            method: "POST",
            body: { leadId: lead.id, answers: state.answers, budget, itemEffects, usedItems: state.usedItems },
          });
          track("assessment_completed", { assessmentId: asm.id, llmGenerated: asm.llmGenerated });
          hideLoadingOverlay();
          await showRpgOverlay({ rank: "🏺", title: "路径图谱已生成", sub: asm.llmGenerated ? "路径导师 + 案例库 + 联网数据已整合" : "已生成（本地降级版，未调路径导师）", btnText: "查看图谱" });
          location.href = `/report.html?id=${encodeURIComponent(asm.id)}`;
        } catch (e) {
          hideLoadingOverlay();
          qs("#nextBtn").disabled = false;
          qs("#backBtn").disabled = false;
          qs("#footerHint").textContent = "生成失败：" + e.message + " · 请重试";
        }
      }

      function startGate(idx) {
        state.phase = "gate";
        state.gateIdx = idx;
        state.gateItemIdx = 0;
        const gate = state.qb.gates[idx];
        state.gateItems = buildGateItems(gate);
        if (state.gateItems.length === 0) {
          advanceFromGate();
          return;
        }
        qs("#nextBtn").textContent = "继续 →";
        qs("#backBtn").style.visibility = "visible";
        showGateIntroThenItem();
      }

      async function showGateIntroThenItem() {
        const gate = state.qb.gates[state.gateIdx];
        qs("#rcPanel").classList.add("rpg-hidden");
        qs("#playPanel").classList.remove("rpg-hidden");
        qs("#rpgScene").classList.remove("event-mode");
        const npcKey = getNpcKey(gate);
        setNpcPortrait(npcKey, { event: false });
        const oreEmoji = getOreEmoji();
        const pPortrait = qs("#playerPortrait");
        if (pPortrait) pPortrait.innerHTML = `<div style="font-size:26px;display:flex;align-items:center;justify-content:center;height:40px;width:40px;background:rgba(212,83,42,.15);border:2px solid rgba(212,83,42,.45);border-radius:50%">${oreEmoji}</div>`;
        const sp = qs("#speakerName");
        sp.textContent = gate.title;
        sp.classList.remove("event");
        clearChildren(qs("#choices"));
        renderChapterBar();
        updateHud();
        state.typing = true;
        qs("#nextBtn").disabled = true;
        await typewriter(qs("#dialogueText"), gate.intro || "（开始本步诊断）", { speed: 18 });
        state.typing = false;
        qs("#nextBtn").disabled = false;
        qs("#footerHint").textContent = "点「继续」开始第一题";
        state._needGateItemFirstRender = true;
      }

      async function advanceFromGate() {
        const gate = state.qb.gates[state.gateIdx];
        await renderGateClearOverlay(gate);
        // 抽卡
        await showCardDraw();
        const next = state.gateIdx + 1;
        if (next >= state.qb.gates.length) {
          renderEndChapter();
        } else {
          startGate(next);
        }
      }

      qs("#nextBtn").onclick = async () => {
        if (state.typing) return;
        if (state.phase === "rc") {
          const err = validateRcStep();
          if (err) { qs("#footerHint").textContent = err; return; }
          if (state.rcStepIdx < state.qb.roleCard.steps.length - 1) {
            state.rcStepIdx += 1;
            renderRcStep();
            updateHud();
            renderChapterBar();
            qs("#footerHint").textContent = "";
          } else {
            await showRpgOverlay({ rank: "🔥", title: "登记完成", sub: "底牌已记录，开始诊断。", btnText: "第一步 →" });
            track("role_card_done", { ore: state.answers.rc_ore_type });
            startGate(0);
          }
          return;
        }
        if (state.phase === "gate") {
          if (state._needGateItemFirstRender) {
            state._needGateItemFirstRender = false;
            await renderGateItem();
            return;
          }
          const itemWrap = state.gateItems[state.gateItemIdx];
          const q = itemWrap.item;
          const ans = collectGateAnswer();
          const err = validateGateAnswer(q, ans);
          if (err) { qs("#footerHint").textContent = err; return; }
          state.answers[q.id] = ans;
          // 回答问题后触发随机掉落
          tryRandomDrop();
          if (state.gateItemIdx < state.gateItems.length - 1) {
            state.gateItemIdx += 1;
            await renderGateItem();
          } else {
            await advanceFromGate();
          }
          return;
        }
        if (state.phase === "end") {
          await submitAssessment();
          return;
        }
      };

      qs("#invBtn").onclick = (e) => {
        e.stopPropagation();
        toggleInventory();
      };

      qs("#backBtn").onclick = async () => {
        if (state.typing) return;
        if (state.phase === "rc") {
          if (state.rcStepIdx > 0) {
            state.rcStepIdx -= 1;
            renderRcStep();
            updateHud();
            renderChapterBar();
          }
          return;
        }
        if (state.phase === "gate") {
          if (state.gateItemIdx > 0) {
            state.gateItemIdx -= 1;
            await renderGateItem();
          } else if (state.gateIdx > 0) {
            startGate(state.gateIdx - 1);
            state.gateItemIdx = state.gateItems.length - 1;
            await renderGateItem();
          } else {
            state.phase = "rc";
            state.rcStepIdx = state.qb.roleCard.steps.length - 1;
            qs("#playPanel").classList.add("rpg-hidden");
            qs("#rcPanel").classList.remove("rpg-hidden");
            renderRcStep();
            updateHud();
            renderChapterBar();
          }
          return;
        }
        if (state.phase === "end") {
          state.phase = "gate";
          state.gateIdx = state.qb.gates.length - 1;
          state.gateItems = buildGateItems(state.qb.gates[state.gateIdx]);
          state.gateItemIdx = state.gateItems.length - 1;
          qs("#endPanel").classList.add("rpg-hidden");
          qs("#playPanel").classList.remove("rpg-hidden");
          qs("#nextBtn").textContent = "继续 →";
          await renderGateItem();
        }
      };

      let loadingTimer = null;
      function showLoadingOverlay({ title, steps }) {
        return new Promise((resolve) => {
          let ov = qs("#loadingOverlay");
          if (!ov) {
            ov = document.createElement("div");
            ov.id = "loadingOverlay";
            ov.className = "rpg-overlay";
            ov.innerHTML = `<div class="rpg-overlay-card"><div class="rpg-overlay-rank">🔥</div><h3 class="rpg-overlay-title" id="loadingTitle"></h3><p class="rpg-overlay-sub" id="loadingStep" style="min-height:64px"></p></div>`;
            document.body.appendChild(ov);
          }
          ov.querySelector("#loadingTitle").textContent = title;
          requestAnimationFrame(() => ov.classList.add("show"));
          let i = 0;
          const tick = () => {
            ov.querySelector("#loadingStep").textContent = steps[i % steps.length];
            i += 1;
          };
          tick();
          loadingTimer = setInterval(tick, 2500);
          resolve();
        });
      }
      function hideLoadingOverlay() {
        if (loadingTimer) clearInterval(loadingTimer);
        const ov = qs("#loadingOverlay");
        if (ov) ov.classList.remove("show");
      }

      (async function init() {
        track("assessment_start");
        try {
          const [cfg, qb] = await Promise.all([api("/api/config"), api("/api/questionBank")]);
          state.cfg = cfg;
          state.qb = qb;
          setBadge(`v${qb.meta?.version || "?"} · ${qb.gates.length} 道工序`);
          state.phase = "rc";
          qs("#rcPanel").classList.remove("rpg-hidden");
          qs("#playPanel").classList.add("rpg-hidden");
          qs("#endPanel").classList.add("rpg-hidden");
          renderRcStep();
          renderChapterBar();
          updateHud();
          qs("#footerHint").textContent = "填好后点「继续」";
        } catch (e) {
          setBadge("加载失败");
          qs("#footerHint").textContent = "加载失败：" + e.message;
        }
      })();
    </script>
  </body>
</html>
